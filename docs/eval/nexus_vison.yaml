NEXUS — Next-gen Eval & eXperience Unified System
Förslag för optimal metadata/embed/namespace/kategori retrieval-eval 2026

Vad som brister idag (snabb analys)
Ert befintliga eval-system är statiskt JSON-drivet — manuellt skrivna testfall per domän, körs en gång, ingen feedback-loop. Det saknar:

Embedding-space awareness — ingen mätning av hur väl verktyg/intents är separerade i vektorrymden
Auto-genererade testfall — skalas inte utan manuellt arbete
Contrastive evaluation — du vet inte varför ett verktyg väljs fel, bara att det väljs fel
Self-improving loop — systemet lär sig inte av sina misstag
Reranker-specifik eval — ms-marco utvärderas inte isolerat
Namespace confusion tracking — ingen cross-namespace confusion matrix
